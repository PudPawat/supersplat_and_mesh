<!DOCTYPE html>
<html>
    <head>
        <title>SuperSplat</title>
        <meta charset="utf-8" />
        <base href="__BASE_HREF__">
        <link rel="manifest" href="./manifest.json">
        <link rel="stylesheet" href="./index.css">
        <link rel="shortcut icon" href="#">
        <meta name="description" content="SuperSplat is an advanced browser-based editor for manipulating and optimizing 3D Gaussian Splats. It is open source and engine agnostic." />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

        <!-- Service worker -->
        <script>
            const sw = navigator.serviceWorker;
            if (sw) {
                sw.register('./sw.js')
                    .then(reg => console.log('service worker registered', reg))
                    .catch(err => console.log('failed to register service worker', err));
            }
        </script>
        <!-- Error reporter — shows JS errors on screen so dark-screen bugs are diagnosable -->
        <script>
            window.onerror = function(msg, src, line, col, err) {
                const d = document.createElement('div');
                d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#b00;color:#fff;padding:8px 12px;z-index:99999;font:12px monospace;white-space:pre-wrap;max-height:40vh;overflow:auto';
                d.textContent = '⚠ JS ERROR: ' + msg + '\n' + (src ? src + ':' + line + ':' + col : '') + (err ? '\n' + err.stack : '');
                document.body.appendChild(d);
            };
        </script>
    </head>

    <body>
        <script type="module" src="./index.js"></script>
    </body>
</html>
